<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leather Electrical PNG</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
}

.container{
    width:90%;
    max-width:1300px;
    margin:auto;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    background:rgba(0,0,0,0.88);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-container{
    width:90%;
    max-width:1300px;
    margin:auto;
    padding:18px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box{
    width:48px;
    height:48px;
    background:#facc15;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#000;
    font-weight:700;
}

/* NAV LINKS */
.nav-links{
    display:flex;
    gap:30px;
    align-items:center;
}

.nav-links a{
    color:#fff;
    text-decoration:none;
    font-weight:500;
}

.nav-links a:hover{
    color:#facc15;
}

/* BUTTON */
.quote-btn{
    background:#facc15;
    color:#000;
    padding:12px 22px;
    border:none;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

/* HAMBURGER */
.hamburger{
    display:none;
    font-size:28px;
    cursor:pointer;
}

/* MOBILE MENU */
@media(max-width:768px){

    .hamburger{
        display:block;
        color:#fff;
    }

    .nav-links{
        position:absolute;
        top:80px;
        left:0;
        width:100%;
        background:#111;
        flex-direction:column;
        display:none;
        padding:20px 0;
        text-align:center;
    }

    .nav-links.active{
        display:flex;
    }

    .quote-btn{
        width:80%;
        margin:10px auto;
    }
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1509391366360-2e959784a276?q=80&w=2070&auto=format&fit=crop') center/cover no-repeat;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.75);
}

.hero-content{
    position:relative;
    z-index:2;
    width:90%;
    max-width:800px;
    margin:auto;
}

.hero h1{
    font-size:60px;
}

.hero span{
    color:#facc15;
}

/* SECTIONS */
section{
    padding:100px 0;
}

/* FOOTER */
footer{
    background:#111;
    padding:50px;
    text-align:center;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:2000;
}

.modal-content{
    background:#111;
    padding:30px;
    width:90%;
    max-width:500px;
    border-radius:15px;
}

.modal-content input,
.modal-content textarea{
    width:100%;
    margin:10px 0;
    padding:12px;
    border:none;
    border-radius:8px;
}

.close{
    float:right;
    cursor:pointer;
    color:#facc15;
    font-size:22px;
}

.submit-btn{
    background:#facc15;
    border:none;
    padding:12px;
    width:100%;
    font-weight:700;
    cursor:pointer;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="nav-container">

        <div class="logo">
            <div class="logo-box">⚡</div>
            <h2>Leather Electrical</h2>
        </div>

        <div class="hamburger" onclick="toggleMenu()">☰</div>

        <div class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>

            <button class="quote-btn" onclick="openModal()">Get Quote</button>
        </div>

    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Reliable Electrical & <span>Telecom Solutions</span></h1>
        <p>Engineering services across Papua New Guinea.</p>
    </div>
</section>

<!-- GET QUOTE MODAL -->
<div class="modal" id="quoteModal">

    <div class="modal-content">

        <span class="close" onclick="closeModal()">✖</span>

        <h2>Get Quote</h2>

        <input type="text" placeholder="Your Name">
        <input type="text" placeholder="Phone Number">
        <input type="text" placeholder="Location">
        <textarea rows="4" placeholder="Describe your project"></textarea>

        <button class="submit-btn">Submit Request</button>

    </div>

</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Leather Electrical PNG</p>
</footer>

<script>

/* MENU TOGGLE */
function toggleMenu(){
    document.getElementById("navLinks").classList.toggle("active");
}

/* MODAL */
function openModal(){
    document.getElementById("quoteModal").style.display="flex";
}

function closeModal(){
    document.getElementById("quoteModal").style.display="none";
}

window.onclick = function(e){
    if(e.target.id === "quoteModal"){
        closeModal();
    }
}

</script>

</body>
</html>
