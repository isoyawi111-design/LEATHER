<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Leather Electrical PNG</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
}

/* NAVBAR */
nav{
    position:fixed;
    top:0;
    width:100%;
    z-index:1000;
    background:rgba(0,0,0,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(255,255,255,0.08);
}

.nav-container{
    width:90%;
    margin:auto;
    padding:18px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* LOGO */
.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-box{
    width:45px;
    height:45px;
    background:#facc15;
    color:#000;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:10px;
}

/* NAV LINKS */
.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    color:#fff;
    text-decoration:none;
    font-weight:500;
}

.nav-links a:hover{
    color:#facc15;
}

/* BUTTON */
.quote-btn{
    background:#facc15;
    color:#000;
    padding:12px 22px;
    border:none;
    border-radius:10px;
    font-weight:700;
    cursor:pointer;
}

/* HAMBURGER */
.menu-btn{
    display:none;
    font-size:30px;
    cursor:pointer;
    color:#fff;
}

/* MOBILE MENU */
.mobile-menu{
    display:none;
    flex-direction:column;
    background:#111;
    position:absolute;
    top:70px;
    left:0;
    width:100%;
    padding:20px;
    border-top:1px solid #222;
}

.mobile-menu a{
    padding:12px;
    color:#fff;
    text-decoration:none;
    border-bottom:1px solid #222;
}

.mobile-menu a:hover{
    color:#facc15;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    background:url('https://images.unsplash.com/photo-1509391366360-2e959784a276?q=80&w=2070') center/cover no-repeat;
    position:relative;
}

.hero::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.75);
}

.hero-content{
    position:relative;
    width:90%;
    margin:auto;
}

/* RESPONSIVE */
@media(max-width:768px){

    .nav-links,
    .quote-btn{
        display:none;
    }

    .menu-btn{
        display:block;
    }
}

</style>
</head>

<body>

<!-- NAV -->
<nav>

    <div class="nav-container">

        <div class="logo">
            <div class="logo-box">⚡</div>
            <h1>Leather Electrical</h1>
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="projects.html">Projects</a>
            <a href="contact.html">Contact</a>
        </div>

        <button class="quote-btn" onclick="openQuote()">
            Get Quote
        </button>

        <div class="menu-btn" onclick="toggleMenu()">☰</div>

    </div>

    <!-- MOBILE MENU -->
    <div class="mobile-menu" id="mobileMenu">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="projects.html">Projects</a>
        <a href="contact.html">Contact</a>
        <a href="#" onclick="openQuote()">Get Quote</a>
    </div>

</nav>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h2>Reliable Electrical & Telecom Solutions</h2>
        <p>Professional engineering services across Papua New Guinea</p>
    </div>
</section>

<script>

/* TOGGLE MOBILE MENU */
function toggleMenu(){
    let menu = document.getElementById("mobileMenu");
    menu.style.display = menu.style.display === "flex" ? "none" : "flex";
}

/* GET QUOTE POPUP */
function openQuote(){
    let name = prompt("Enter your Name:");
    let phone = prompt("Enter your Phone Number:");
    let message = prompt("Project Details:");

    if(name && phone && message){
        alert("Quote request sent! We will contact you soon.");
    } else {
        alert("Please fill all details.");
    }
}

</script>

</body>
</html>
